name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check src/ app/ scripts/ tests/ --ignore E501

      - name: Dashboard syntax check
        run: python -m py_compile app/dashboard.py

      - name: Run tests
        run: pytest -q tests/
